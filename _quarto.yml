project:
  type: website
  output-dir: _site
  resources:
    - tools/_shared/**

filters:
  - filters/fs-seo.lua

fs-seo:
  canonical-base: "https://guanglab.org/foundation-stack"

website:
  title: "Foundation Stack"
  site-url: "https://fs.guanglab.org"
  description: "Structured knowledge on adolescent PPCS aerobic exercise prescription."
  draft-mode: gone
  navbar:
    left:
      - text: "Series Hub"
        href: index.qmd
      - text: "Tools"
        href: tools/index.qmd
      - text: "About"
        href: about.qmd
    right:
      - text: "Guang Li"
        href: https://guanglab.org/
      - text: "ORCID"
        href: https://orcid.org/0009-0004-2807-9029
  page-footer:
    left: "© 2026 Foundation Stack · Guang Li"
    right:
      - text: "RSS"
        href: index.xml
  plausible-analytics: |
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-bpHHTwogSyqkWYSnIZ6d7.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    mermaid:
      theme: neutral
    toc: true
    toc-depth: 3
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      - text: |
          <meta name="google-site-verification" content="2GHSzIXJ8C7iKHTpM5GkBQu5msSa3N2bAHD3P3lu8Ac" />

execute:
  freeze: auto
