# fs.guanglab.org — Foundation Stack (canonical public series)
# Install: sudo cp to /etc/nginx/sites-available/ && ln -s sites-enabled/
# TLS: sudo certbot --nginx -d fs.guanglab.org

server {
    listen 443 ssl;
    server_name fs.guanglab.org;

    root /home/ubuntu/projects/guanglab/foundation-stack/_site;
    index index.html;

    include /etc/nginx/guanglab-bot-guard-ips.conf;
    include /etc/nginx/guanglab-bot-guard-paths.conf;

    # RSS/feed relative-link fallout: /pillar2-NNN-slug → /posts/pillar2-NNN-slug
    location ~ ^/pillar2-([0-9][0-9][0-9]-[a-z0-9-]+)/?(.*)$ {
        return 301 /posts/pillar2-$1/$2;
    }

    location /tvr/ {
        proxy_pass http://127.0.0.1:18901;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location ~ ^/posts/ {
        limit_req zone=guanglab_static_posts burst=15 nodelay;
        try_files $uri $uri/ $uri.html =404;
    }

    # Draft previews — never index (meta + header belt-and-suspenders)
    location ^~ /preview/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ $uri.html =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    ssl_certificate /etc/letsencrypt/live/fs.guanglab.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fs.guanglab.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = fs.guanglab.org) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name fs.guanglab.org;
    return 301 https://fs.guanglab.org$request_uri;
}
