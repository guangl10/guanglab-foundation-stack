# fs.guanglab.org — Foundation Stack (canonical public series)
# Install: sudo cp to /etc/nginx/sites-available/ && ln -s sites-enabled/
# TLS: sudo certbot --nginx -d fs.guanglab.org

server {
    listen 443 ssl;
    server_name fs.guanglab.org;

    root /home/ubuntu/projects/guanglab/foundation-stack/_site;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    ssl_certificate /etc/letsencrypt/live/guanglab.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guanglab.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name fs.guanglab.org;
    return 301 https://fs.guanglab.org$request_uri;
}
