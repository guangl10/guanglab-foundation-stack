# Attack-path blocks — include inside server {} before generic location /

location ~* /\.(env|git|aws|svn|hg|docker|vscode)(/|$) {
    access_log off;
    return 444;
}

location ~* ^/(wp-admin|wp-login\.php|wp-content|wp-includes|xmlrpc\.php|phpmyadmin|pma)(/|$) {
    access_log off;
    return 444;
}

location ~* (phpunit|vendor/phpunit|\.aws/credentials|config\.json|\.DS_Store)$ {
    access_log off;
    return 444;
}
