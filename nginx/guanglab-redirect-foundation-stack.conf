# Include inside guanglab.org server {} block (jack-research.conf)
# 301 legacy paths after FS moved to fs.guanglab.org

location = /foundation-stack {
    return 301 https://fs.guanglab.org/;
}

location ^~ /foundation-stack/ {
    rewrite ^/foundation-stack/(.*)$ https://fs.guanglab.org/$1 permanent;
}

