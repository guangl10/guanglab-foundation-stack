# stack.guanglab.org — legacy hostname → fs.guanglab.org (301)
# Keep enabled until old links expire.

server {
    listen 443 ssl;
    server_name stack.guanglab.org;

    ssl_certificate /etc/letsencrypt/live/guanglab.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guanglab.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://fs.guanglab.org$request_uri;
}

server {
    listen 80;
    server_name stack.guanglab.org;
    return 301 https://fs.guanglab.org$request_uri;
}
